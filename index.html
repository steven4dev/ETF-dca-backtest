<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0052 富邦科技 定期定額回測分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #4f8ef7;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem;
    text-align: center;
  }
  header h1 { font-size: 1.8rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  header p  { color: var(--muted); margin-top: .4rem; font-size: .9rem; }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: .7rem;
    font-weight: 600;
    padding: .15rem .55rem;
    border-radius: 999px;
    margin-left: .5rem;
    vertical-align: middle;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 1rem;
    padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .section-title .icon { font-size: 1.1rem; }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2.5rem;
  }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1rem;
    text-align: center;
    transition: border-color .2s;
  }
  .kpi:hover { border-color: var(--accent); }
  .kpi .val  { font-size: 1.5rem; font-weight: 700; }
  .kpi .lbl  { font-size: .75rem; color: var(--muted); margin-top: .25rem; }
  .kpi .neg  { color: var(--red); }
  .kpi .pos  { color: var(--green); }
  .kpi .neu  { color: var(--accent); }

  /* Table */
  .table-wrap { overflow-x: auto; margin-bottom: 2.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead tr { background: #232636; }
  thead th {
    padding: .75rem 1rem;
    text-align: right;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: #1e2133; }
  tbody td {
    padding: .75rem 1rem;
    text-align: right;
    white-space: nowrap;
  }
  tbody td:first-child { text-align: left; font-weight: 600; }
  .tag {
    display: inline-block;
    font-size: .65rem;
    padding: .1rem .4rem;
    border-radius: 4px;
    margin-left: .3rem;
    font-weight: 600;
    vertical-align: middle;
  }
  .tag-best   { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .tag-safe   { background: rgba(79,142,247,.15); color: var(--accent); border: 1px solid rgba(79,142,247,.3); }
  .tag-worst  { background: rgba(239,68,68,.15); color: var(--red);  border: 1px solid rgba(239,68,68,.3); }

  /* Charts */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }
  @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .05em; }
  .chart-wrap  { position: relative; height: 260px; }
  .chart-wrap.tall { height: 340px; }

  /* Conclusion */
  .conclusion-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1rem;
    margin-bottom: 2.5rem;
  }
  .c-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
  }
  .c-card h3 {
    font-size: .85rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: .75rem;
  }
  .c-card p, .c-card li { font-size: .875rem; color: var(--muted); }
  .c-card ul { padding-left: 1.2rem; }
  .c-card li { margin-bottom: .35rem; }
  .highlight { color: var(--text) !important; font-weight: 600; }
  .green { color: var(--green) !important; }
  .red   { color: var(--red)   !important; }

  /* Static chart image */
  .img-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 2.5rem;
    text-align: center;
  }
  .img-card img { max-width: 100%; border-radius: 8px; }

  footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: .8rem;
    border-top: 1px solid var(--border);
  }

  /* Tab buttons */
  .tab-row { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab-btn {
    background: var(--border);
    color: var(--muted);
    border: none;
    padding: .4rem .9rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: .8rem;
    font-weight: 600;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }
</style>
</head>

<header>
  <h1>0052 富邦科技<span class="badge">ETF</span> 定期定額回測分析</h1>
  <p>回測期間：2024-04-16 ～ 2026-04-14
     &nbsp;|&nbsp; 2.0 年 &nbsp;|&nbsp; 每次投入 NT$10,000 &nbsp;|&nbsp; 五組扣款日比較</p>

// Bar chart helper
function barChart(canvasId, labels, values, colors, yLabel, formatFn) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets:[{ data:values, backgroundColor:colors,
      borderRadius:6, borderSkipped:false }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: {display:false},
        tooltip: { callbacks: { label: c => ' ' + formatFn(c.raw) } }
      },
      scales: {
        x: { ticks:{color:'#94a3b8'}, grid:{color:'#1e2133'} },
        y: {
          ticks: { color:'#94a3b8', callback: v => formatFn(v) },
          grid: {color:'#1e2133'}
        }

    }
  });
}

        <li>空頭期持股最多的組合，行情回升時<span class="highlight">獲利最快</span></li>
        <li>歷史績效不代表未來；建議長期持有、定期檢視</li>
      </ul>`
  },
];

const concDiv = document.getElementById('conclusion');
conclusions.forEach(c => {
  concDiv.innerHTML += `<div class="c-card"><h3>${c.title}</h3>${c.html}</div>`;
});
</script>
